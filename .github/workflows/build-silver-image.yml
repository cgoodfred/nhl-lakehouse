name: Build silver image

on:
  push:
    branches: [main]
    paths:
      - 'silver/**'
      - '.github/workflows/build-silver-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-silver-image
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: silver
          file: silver/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/cgoodfred/nhl-lakehouse/silver:latest
            ghcr.io/cgoodfred/nhl-lakehouse/silver:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
