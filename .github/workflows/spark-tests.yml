name: Spark tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'spark/**'
      - '.github/workflows/spark-tests.yml'
  workflow_dispatch:

jobs:
  pytest:
    name: Pytest (spark)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spark
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: astral-sh/setup-uv@v6

      - name: uv sync
        run: uv sync --group dev

      - name: ruff
        run: uv run ruff check .

      - name: pytest
        run: uv run pytest
