name: Silver tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'silver/**'
      - '.github/workflows/silver-tests.yml'

jobs:
  pytest:
    name: Pytest (silver)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: silver
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: astral-sh/setup-uv@v6

      - name: Run pytest
        run: uv run --with 'pyspark==3.5.7' --with pytest pytest tests/
