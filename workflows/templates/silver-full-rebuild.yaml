# CORE PBP silver-tier rebuild as an Argo DAG. Covers the five silver jobs
# that derive from bronze play-by-play (games/plays/players/game_rosters/
# teams). Does NOT cover silver-tracking-frames — that lives in the tracking
# pipeline branch (bronze-tracking-ingest -> silver-tracking-frames -> gold
# tracking tables), which is a separate DAG scheduled for V2 alongside
# converting bronze-tracking-ingest to a WorkflowTemplate.
#
# DAG shape (verified against the actual spark/jobs/silver/*.py source
# reads, not assumed):
#
#   silver-games ──┬─→ silver-plays
#                  ├─→ silver-players
#                  ├─→ silver-game-rosters
#                  └─→ silver-teams
#
# All four downstream jobs depend on silver-games only. silver-teams derives
# from silver.games via a distinct-teams aggregation (verified from
# spark/jobs/silver/teams.py); it does NOT need plays/players/game_rosters.
#
# Per-node executor sizing mirrors the existing spark/k8s/silver/*.yaml
# manifests so behavior matches what `kubectl apply` produces today:
#   games          1c × 2 executors, 2g each
#   plays          2c × 1 executor,  2g   (heavier per-executor for the explode)
#   players        1c × 1 executor,  1g
#   game_rosters   1c × 2 executors, 1g
#   teams          1c × 1 executor,  1g
#
# parallelism: 1 serializes the fan-out because the naive CPU math missed
# two costs:
#
#   1. Each Argo `resource:` step spawns an argoexec pod that itself
#      consumes ~500m CPU (limits) for the polling loop that watches the
#      SparkApplication status. Missed this in the initial design.
#   2. Spark Operator leaves completed / failed SparkApplication drivers
#      around by default. In a fan-out, three "done but not cleaned up"
#      drivers can hoard 6c of the 10c quota, starving the next task.
#      silver-single-table.yaml now sets timeToLiveSeconds: 60 to auto-
#      clean, but even with that, concurrent tasks still race on the peak.
#
# Corrected per-concurrent-task CPU cost (Argo step + Spark driver + execs):
#
#   games         4500m    plays         4500m
#   players       3500m    game_rosters  4500m
#   teams         3500m
#
# Plus ~2000m steady-state (viz + lakekeeper + argo controller + Postgres
# + spark-operator + seaweedfs). Serialized worst-case = 4500m + 2000m =
# 6500m, comfortably inside the 10-CPU quota. Real-world verification
# (silver-full-rebuild-8dzkl) showed parallelism=2 hitting SubmissionFailed
# for silver-players AND silver-teams because their driver pods requested
# 2c against a 9300m-used quota.
#
# Wall-clock cost of parallelism=1: the four downstream jobs run sequentially
# instead of two-at-a-time. Bump back to 2 when either the quota widens (Pi
# cluster expansion) or driver sizes shrink (2c -> 1c per driver).
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: silver-full-rebuild
  namespace: lakehouse
spec:
  entrypoint: dag
  templates:
    - name: dag
      parallelism: 1
      dag:
        tasks:
          - name: silver-games
            templateRef:
              name: silver-single-table
              template: run
            arguments:
              parameters:
                - {name: tier,                 value: silver}
                - {name: job_name,             value: games}
                - {name: file_stem,            value: games}
                - {name: executor_cores,       value: "1"}
                - {name: executor_core_limit,  value: "1"}
                - {name: executor_instances,   value: "2"}
                - {name: executor_memory,      value: "2g"}

          - name: silver-plays
            dependencies: [silver-games]
            templateRef:
              name: silver-single-table
              template: run
            arguments:
              parameters:
                - {name: tier,                 value: silver}
                - {name: job_name,             value: plays}
                - {name: file_stem,            value: plays}
                - {name: executor_cores,       value: "2"}
                - {name: executor_core_limit,  value: "2"}
                - {name: executor_instances,   value: "1"}
                - {name: executor_memory,      value: "2g"}

          - name: silver-players
            dependencies: [silver-games]
            templateRef:
              name: silver-single-table
              template: run
            arguments:
              parameters:
                - {name: tier,                 value: silver}
                - {name: job_name,             value: players}
                - {name: file_stem,            value: players}
                - {name: executor_cores,       value: "1"}
                - {name: executor_core_limit,  value: "1"}
                - {name: executor_instances,   value: "1"}
                - {name: executor_memory,      value: "1g"}

          - name: silver-game-rosters
            dependencies: [silver-games]
            templateRef:
              name: silver-single-table
              template: run
            arguments:
              parameters:
                - {name: tier,                 value: silver}
                - {name: job_name,             value: game-rosters}
                - {name: file_stem,            value: game_rosters}
                - {name: executor_cores,       value: "1"}
                - {name: executor_core_limit,  value: "1"}
                - {name: executor_instances,   value: "2"}
                - {name: executor_memory,      value: "1g"}

          - name: silver-teams
            dependencies: [silver-games]
            templateRef:
              name: silver-single-table
              template: run
            arguments:
              parameters:
                - {name: tier,                 value: silver}
                - {name: job_name,             value: teams}
                - {name: file_stem,            value: teams}
                - {name: executor_cores,       value: "1"}
                - {name: executor_core_limit,  value: "1"}
                - {name: executor_instances,   value: "1"}
                - {name: executor_memory,      value: "1g"}
