# One-shot Workflow that rebuilds the core PBP silver tier via the
# silver-full-rebuild DAG (games/plays/players/game_rosters/teams — not
# silver-tracking-frames, which lives in its own pipeline branch).
#
#   argo submit -n lakehouse workflows/workflows/silver-full-rebuild-example.yaml --watch
#
# Wall-clock: DAG runs one task at a time (parallelism: 1). games first,
# then plays -> players -> game_rosters -> teams sequentially. On the Pi
# cluster expect 20-30 minutes total for the current data volume. Faster
# fan-out is possible once the quota widens or driver sizes shrink — see
# the header comment in workflows/templates/silver-full-rebuild.yaml for
# the CPU accounting that forced parallelism: 1.
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: silver-full-rebuild-
  namespace: lakehouse
spec:
  workflowTemplateRef:
    name: silver-full-rebuild
