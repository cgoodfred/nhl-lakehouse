# One-shot Workflow that rebuilds the full silver tier via the
# silver-full-rebuild DAG.
#
#   argo submit -n lakehouse workflows/workflows/silver-full-rebuild-example.yaml --watch
#
# Wall-clock: ~ max(games) + max(plays, players, game_rosters, teams). With
# parallelism: 3 on the DAG template, three of the four fan-out jobs run
# concurrently and the fourth backfills as a slot frees. On the Pi cluster
# expect 15-25 minutes total for the current data volume.
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: silver-full-rebuild-
  namespace: lakehouse
spec:
  workflowTemplateRef:
    name: silver-full-rebuild
